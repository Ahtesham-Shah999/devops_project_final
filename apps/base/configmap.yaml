apiVersion: v1
kind: ConfigMap
metadata:
  name: webapp-html
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>GitOps Demo</title>
      <style>
        body { font-family: sans-serif; text-align: center; margin-top: 100px; background-color: #f0f8ff; }
        h1 { color: #0066cc; }
      </style>
    </head>
    <body>
      <h1>🚀 Hello from Flux CD!</h1>
      <h2>This website was automatically deployed via GitOps.</h2>
      <p>I updated the GitHub "Menu" and Flux updated the Kubernetes "Kitchen" without running kubectl!</p>
    </body>
    </html>
