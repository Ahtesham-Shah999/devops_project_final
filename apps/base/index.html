<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Pipeline Status</title>
  <style>
    :root {
      --primary-color: #2563eb;
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
    }
    body { 
      font-family: 'Segoe UI', system-ui, sans-serif; 
      background-color: var(--bg-color); 
      color: var(--text-main);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .dashboard {
      background-color: var(--card-bg);
      padding: 3rem 4rem;
      border-radius: 16px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
      text-align: center;
      max-width: 700px;
      border-top: 4px solid var(--primary-color);
    }
    .badge {
      background-color: rgba(16, 185, 129, 0.2);
      color: var(--success);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 0.875rem;
      display: inline-block;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(16, 185, 129, 0.4);
    }
    h1 { 
      margin: 0 0 1rem 0; 
      font-size: 2.5rem;
      letter-spacing: -0.025em;
    }
    h2 {
      color: var(--text-muted);
      font-weight: 400;
      margin: 0 0 2rem 0;
      font-size: 1.25rem;
      line-height: 1.5;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .stat-card {
      background-color: rgba(255,255,255,0.03);
      padding: 1.5rem;
      border-radius: 12px;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary-color);
    }
    .stat-label {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .pulse {
      display: inline-block;
      width: 10px;
      height: 10px;
      background-color: var(--success);
      border-radius: 50%;
      margin-right: 8px;
      box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
      animation: pulsing 2s infinite;
    }
    @keyframes pulsing {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="badge"><span class="pulse"></span> LIVE ENVIRONMENT</div>
    <h1>Sir Faraz</h1>
    <h2>Successfully provisioned and deployed automatically via Flux CD. Infrastructure as Code synchronization is active and healthy.</h2>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value">Automated</div>
        <div class="stat-label">Deployment</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">Active</div>
        <div class="stat-label">Drift Detection</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">Synced</div>
        <div class="stat-label">GitHub Source</div>
      </div>
    </div>
  </div>
</body>
</html>
